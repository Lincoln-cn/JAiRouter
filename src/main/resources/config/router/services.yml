# ========================================
# 模型服务实例配置 (router 模块)
# ========================================
# 此文件包含各模型服务实例的详细配置
# 位置：org.unreal.modelrouter.router.model

model:
  services:
    # ========================
    # 聊天服务 (chat)
    # ========================
    chat:
      load-balance:
        type: least-connections
      adapter: gpustack
      rate-limit:
        enabled: true
        algorithm: "token-bucket"
        capacity: 100
        rate: 10
        scope: "service"
        client-ip-enable: true
      instances:
        - name: "qwen3:4b"
          base-url: "http://172.16.30.6:9090"
          path: "/v1/chat/completions"
          weight: 1
          headers:
            Authorization: "Bearer ${GPUSTACK_API_TOKEN:}"
          rate-limit:
            enabled: true
            algorithm: "token-bucket"
            capacity: 50
            rate: 5
            scope: "instance"

    # ========================
    # 嵌入服务 (embedding)
    # ========================
    embedding:
      load-balance:
        type: round-robin
      rate-limit:
        enabled: true
        algorithm: "token-bucket"
        capacity: 200
        rate: 20
        scope: "service"
        client-ip-enable: true
      circuit-breaker:
        enabled: true
        failureThreshold: 10
        timeout: 30000
        successThreshold: 3
      instances:
        - name: "nomic-embed-text-v1.5"
          base-url: "http://172.16.30.6:9090"
          path: "/v1/embeddings"
          weight: 1
          headers:
            Authorization: "Bearer ${GPUSTACK_API_TOKEN:}"
        - name: "bge-large-zh-v1.5"
          base-url: "http://172.16.30.6:9090"
          path: "/v1/embeddings"
          weight: 1
          headers:
            Authorization: "Bearer ${GPUSTACK_API_TOKEN:}"

    # ========================
    # 重排序服务 (rerank)
    # ========================
    rerank:
      load-balance:
        type: ip-hash
        hash-algorithm: "sha256"
      fallback:
        enabled: true
        strategy: cache
        cache-size: 50
        cache-ttl: 600000
      rate-limit:
        enabled: true
        algorithm: "token-bucket"
        capacity: 50
        rate: 5
        scope: "service"
        client-ip-enable: true
      instances:
        - name: "bge-reranker-v2-m3"
          base-url: "http://172.16.30.6:9090"
          path: "/v1/rerank"
          weight: 2
          headers:
            Authorization: "Bearer ${GPUSTACK_API_TOKEN:}"

    # ========================
    # 语音合成服务 (tts)
    # ========================
    tts:
      load-balance:
        type: random
      rate-limit:
        enabled: true
        algorithm: "token-bucket"
        capacity: 30
        rate: 3
        scope: "service"
        client-ip-enable: true
      instances:
        - name: "cosyvoice-300m"
          base-url: "http://172.16.30.6:9090"
          path: "/v1/audio/speech"
          weight: 1
          headers:
            Authorization: "Bearer ${GPUSTACK_API_TOKEN:}"

    # ========================
    # 语音识别服务 (stt)
    # ========================
    stt:
      load-balance:
        type: round-robin
      rate-limit:
        enabled: true
        algorithm: "token-bucket"
        capacity: 30
        rate: 3
        scope: "service"
        client-ip-enable: true
      instances:
        - name: "faster-whisper-tiny"
          base-url: "http://172.16.30.6:9090"
          path: "/v1/audio/transcriptions"
          weight: 1
          headers:
            Authorization: "Bearer ${GPUSTACK_API_TOKEN:}"

    # ========================
    # 图像生成服务 (imgGen)
    # ========================
    imgGen:
      load-balance:
        type: round-robin
      rate-limit:
        enabled: true
        algorithm: "token-bucket"
        capacity: 10
        rate: 1
        scope: "service"
        client-ip-enable: true
      instances:
        - name: "stable-diffusion-2-1"
          base-url: "http://172.16.30.6:9090"
          path: "/v1/images/generations"
          weight: 1
          headers:
            Authorization: "Bearer ${GPUSTACK_API_TOKEN:}"

    # ========================
    # 图像编辑服务 (imgEdit)
    # ========================
    imgEdit:
      load-balance:
        type: round-robin
      rate-limit:
        enabled: true
        algorithm: "token-bucket"
        capacity: 10
        rate: 1
        scope: "service"
        client-ip-enable: true
      instances:
        - name: "stable-diffusion-2-1"
          base-url: "http://172.16.30.6:9090"
          path: "/v1/images/edits"
          weight: 1
          headers:
            Authorization: "Bearer ${GPUSTACK_API_TOKEN:}"