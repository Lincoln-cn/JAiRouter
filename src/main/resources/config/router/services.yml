# ========================================
# 模型服务实例配置 (router 模块)
# ========================================
# 此文件包含各模型服务实例的详细配置
# 位置：org.unreal.modelrouter.router.model
# v2.x: 添加 instance-id 字段用于实例唯一标识

model:
  services:
    # ========================
    # 聊天服务 (chat)
    # ========================
    chat:
      load-balance:
        type: least-connections
      adapter: gpustack
      rate-limit:
        enabled: true
        algorithm: "token-bucket"
        capacity: 100
        rate: 10
        scope: "service"
        client-ip-enable: true
      instances:
        - name: "qwen2.5:1.5b"
          instance-id: "c09eb43b-5084-48bb-8fc8-3e5ab2505c31"
          base-url: "http://172.16.30.6:12434"
          path: "/v1/chat/completions"
          adapter: "ollama"
          weight: 1
          headers: {}

    # ========================
    # 嵌入服务 (embedding)
    # ========================
    embedding:
      load-balance:
        type: round-robin
      rate-limit:
        enabled: true
        algorithm: "token-bucket"
        capacity: 200
        rate: 20
        scope: "service"
        client-ip-enable: true
      circuit-breaker:
        enabled: true
        failureThreshold: 10
        timeout: 30000
        successThreshold: 3
      instances:
        - name: "nomic-embed-text-v1.5"
          instance-id: "77ce6597-a2d8-47f9-991e-331f05b036ea"
          base-url: "http://172.16.30.6:9090"
          path: "/v1/embeddings"
          weight: 1
          headers:
            Authorization: "Bearer ${GPUSTACK_API_TOKEN:}"
        - name: "shaw/dmeta-embedding-zh:latest"
          instance-id: "aa75c8f0-f364-4eb8-8552-ebea390d7774"
          base-url: "http://172.16.30.6:12434/"
          path: "/api/embeddings"
          adapter: "ollama"
          weight: 1
          headers: {}
        - name: "bge-large-zh-v1.5"
          instance-id: "418a9207-45aa-4607-8ebc-2de50b909015"
          base-url: "http://172.16.30.6:9090/"
          path: "/v1/embeddings"
          weight: 1
          headers:
            Authorization: "Bearer ${GPUSTACK_API_TOKEN:}"

    # ========================
    # 重排序服务 (rerank)
    # ========================
    rerank:
      load-balance:
        type: ip-hash
        hash-algorithm: "sha256"
      fallback:
        enabled: true
        strategy: cache
        cache-size: 50
        cache-ttl: 600000
      rate-limit:
        enabled: true
        algorithm: "token-bucket"
        capacity: 50
        rate: 5
        scope: "service"
        client-ip-enable: true
      instances:
        - name: "bge-reranker-v2-m3"
          instance-id: "f239e248-f6cb-4738-820e-f5428fa59e9a"
          base-url: "http://172.16.30.6:9090"
          path: "/v1/rerank"
          weight: 2
          headers:
            Authorization: "Bearer ${GPUSTACK_API_TOKEN:}"

    # ========================
    # 语音合成服务 (tts)
    # ========================
    tts:
      load-balance:
        type: random
      rate-limit:
        enabled: true
        algorithm: "token-bucket"
        capacity: 30
        rate: 3
        scope: "service"
        client-ip-enable: true
      instances:
        - name: "cosyvoice-300m"
          instance-id: "bf463e1b-c18a-4f19-847a-6054f21aeb3c"
          base-url: "http://172.16.30.6:9090"
          path: "/v1/audio/speech"
          weight: 1
          headers:
            Authorization: "Bearer ${GPUSTACK_API_TOKEN:}"

    # ========================
    # 语音识别服务 (stt)
    # ========================
    stt:
      load-balance:
        type: round-robin
      rate-limit:
        enabled: true
        algorithm: "token-bucket"
        capacity: 30
        rate: 3
        scope: "service"
        client-ip-enable: true
      instances:
        - name: "faster-whisper-tiny"
          instance-id: "fe0d9d76-9eaf-4776-8d46-8fca38e6ec29"
          base-url: "http://172.16.30.6:9090"
          path: "/v1/audio/transcriptions"
          weight: 1
          headers:
            Authorization: "Bearer ${GPUSTACK_API_TOKEN:}"

    # ========================
    # 图像生成服务 (imgGen)
    # ========================
    imgGen:
      load-balance:
        type: round-robin
      rate-limit:
        enabled: true
        algorithm: "token-bucket"
        capacity: 10
        rate: 1
        scope: "service"
        client-ip-enable: true
      instances:
        - name: "stable-diffusion-2-1"
          instance-id: "317c09eb-aa36-41b1-912b-4925411d01b9"
          base-url: "http://172.16.30.6:9090"
          path: "/v1/images/generations"
          weight: 1
          headers:
            Authorization: "Bearer ${GPUSTACK_API_TOKEN:}"

    # ========================
    # 图像编辑服务 (imgEdit)
    # ========================
    imgEdit:
      load-balance:
        type: round-robin
      rate-limit:
        enabled: true
        algorithm: "token-bucket"
        capacity: 10
        rate: 1
        scope: "service"
        client-ip-enable: true
      instances:
        - name: "stable-diffusion-2-1"
          instance-id: "ca43a926-0b63-4b2e-b89e-cc226073f31b"
          base-url: "http://172.16.30.6:9090"
          path: "/v1/images/edits"
          weight: 1
          headers:
            Authorization: "Bearer ${GPUSTACK_API_TOKEN:}"
