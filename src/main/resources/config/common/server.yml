# ========================================
# 服务器配置 (common 模块)
# ========================================
# 此文件包含服务器基础配置
# 位置：org.unreal.modelrouter.common

server:
  port: 8080

# Spring Boot 基础配置
spring:
  main:
    allow-circular-references: false
  
  # WebFlux 配置
  webflux:
    multipart:
      max-in-memory-size: 10MB
      max-disk-usage-per-part: 100MB
      max-parts: 50
      max-headers-size: 8KB
      file-storage-directory: "${java.io.tmpdir}"

  # Reactor Netty 配置
  reactor:
    netty:
      max-initial-line-length: 4096
      max-header-size: 8192
      max-chunk-size: 8192

  # Profile 配置
  profiles:
    active: dev