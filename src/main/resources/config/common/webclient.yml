# ========================================
# WebClient 配置 (common 模块)
# ========================================
# 此文件包含 WebClient HTTP 客户端配置
# 位置：org.unreal.modelrouter.common

webclient:
  # 连接超时时间
  connection-timeout: 15s
  
  # 读取超时时间
  read-timeout: 60s
  
  # 写入超时时间
  write-timeout: 60s
  
  # 内存中最大数据大小
  max-in-memory-size: 10MB