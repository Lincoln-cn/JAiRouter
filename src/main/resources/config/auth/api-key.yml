# ========================================
# API Key 认证配置 (auth 模块)
# ========================================
# 此文件包含 API Key 认证相关配置
# 位置：org.unreal.modelrouter.auth.security

jairouter:
  security:
    api-key:
      # API Key 功能开关
      enabled: true

      # API Key 头名称
      header-name: "X-API-Key"

      # 默认过期天数
      default-expiration-days: 365

      # 缓存配置
      cache-enabled: true
      cache-expiration-seconds: 3600

      # API Key 列表（仅用于开发环境测试）
      # 生产环境应通过 API 管理或环境变量配置
      keys:
        - key-id: "test-key-001"
          key-value: "sk-test-api-key-12345678"
          description: "测试用 API Key"
          permissions: "read,write"
          enabled: true

    # API Key 配额管理配置
    quota:
      # 启用配额清理调度器（每天凌晨 3:00 清理 >30 天的历史数据）
      cleanup:
        enabled: true