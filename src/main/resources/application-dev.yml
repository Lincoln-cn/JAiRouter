# ========================================
# 开发环境配置（v2.8.x 精简版）
# ========================================
# 此文件仅包含开发环境特定的差异化配置
# 基础配置通过模块化导入，详见 application.yml

# 服务器配置（开发环境）
server:
  port: 8080

# Swagger API 文档配置（仅开发环境）
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
  packages-to-scan: org.unreal.modelrouter.controller
  show-actuator: true
  cache:
    disabled: true

# H2 控制台（仅开发环境）
spring:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

# 日志配置（开发环境详细日志）
logging:
  level:
    org.unreal.modelrouter: DEBUG
    org.springframework: INFO

# 管理端点（开发环境全部开放）
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      show-components: always
    jwt-tokens:
      enabled: true
    jwt-blacklist:
      enabled: true
    jwt-persistence-health:
      enabled: true

# 安全配置（开发环境启用测试功能）
jairouter:
  security:
    enabled: true
    
    jwt:
      enabled: true
      secret: "${DEV_JWT_SECRET:dev-secret-key-for-testing-only-32-characters-minimum}"
      
      accounts:
        - username: "admin"
          password: "{noop}${DEV_ADMIN_PASSWORD:admin123}"
          roles: ["ADMIN", "USER"]
          enabled: true
        - username: "user"
          password: "{noop}${DEV_USER_PASSWORD:user123}"
          roles: ["USER"]
          enabled: true
    
    api-key:
      enabled: true
      
    audit:
      log-level: "DEBUG"
      include-request-body: true
      include-response-body: true
    
    sanitization:
      response:
        enabled: false

# WebClient 配置（开发环境宽松超时）
webclient:
  connection-timeout: 5s
  read-timeout: 15s
  write-timeout: 15s

# 调试模式
debug: false