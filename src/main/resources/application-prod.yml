# ========================================
# 生产环境配置（v2.8.x 精简版）
# ========================================
# 此文件仅包含生产环境特定的差异化配置
# 基础配置通过模块化导入，详见 application.yml
# 敏感配置必须使用环境变量！

# 日志配置（生产环境最小化）
logging:
  level:
    root: WARN
    org.unreal.modelrouter: WARN
    org.springframework: ERROR
  file:
    name: logs/jairouter-prod.log

# 存储配置（生产环境关闭自动迁移）
store:
  migration:
    enabled: false
  security-migration:
    enabled: false

# H2 控制台（生产环境关闭）
spring:
  h2:
    console:
      enabled: false

# 管理端点（生产环境最小开放）
management:
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

# 安全配置（生产环境）
jairouter:
  security:
    # 生产环境安全功能默认关闭，需要显式启用
    enabled: false

    jwt:
      enabled: false
      # 生产环境必须使用环境变量设置密钥
      secret: "${PROD_JWT_SECRET:}"
      issuer: "jairouter-prod"

      persistence:
        enabled: false
        redis:
          enabled: false

    api-key:
      enabled: true
      default-expiration-days: 365

    audit:
      log-level: "WARN"
      include-request-body: false
      include-response-body: false
      retention-days: 90
      alert-enabled: true
      alert-thresholds:
        auth-failures-per-minute: 5
        suspicious-requests-per-minute: 10

    sanitization:
      response:
        enabled: true
        log-sanitization: false

    monitoring:
      enabled: true
      alerts:
        enabled: true
        thresholds:
          authentication-failure-rate: 0.05
          sanitization-error-rate: 0.01
          response-time-p99: 500
          max-requests-per-minute: 5000
        notifications:
          email:
            enabled: true
            recipients:
              - "${SECURITY_ALERT_EMAIL:}"
          webhook:
            enabled: true
            url: "${SECURITY_ALERT_WEBHOOK:}"

    # 性能配置（生产环境优化）
    performance:
      authentication:
        thread-pool-size: 20
        timeout-ms: 3000
      sanitization:
        thread-pool-size: 10
        streaming-threshold: 2097152
      cache:
        local:
          api-key:
            max-size: 10000
          jwt-blacklist:
            max-size: 100000