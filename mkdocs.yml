extra:
  # SEO Meta Tags
  seo:
    title: "JAiRouter - AI 模型服务统一网关"
    keywords:
      - AI gateway
      - Ollama proxy
      - vLLM load balancer
      - OpenAI compatible API
      - GPUStack
      - Xinference
      - AI模型路由
      - 负载均衡
      - 限流熔断
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Lincoln-cn/jairouter
      name: GitHub Repository
    - icon: fontawesome/solid/book
      link: https://lincoln-cn.github.io/JAiRouter
      name: Documentation
  alternate:
    - name: 中文
      link: /
      lang: zh
    - name: English
      link: /en/
      lang: en
  analytics:
    provider: google
    property: G-C3YPY477RC  # 替换为实际的 Google Analytics ID
    feedback:
      title: 这个页面有帮助吗？
      ratings:
        - icon: material/emoticon-happy-outline
          name: 有帮助
          data: 1
          note: >-
            感谢您的反馈！
        - icon: material/emoticon-sad-outline
          name: 需要改进
          data: 0
          note: >-
            感谢您的反馈！请通过 GitHub Issues 告诉我们如何改进。

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/language-switcher.js
  - https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8229708772289943

