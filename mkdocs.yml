site_name: JAiRouter 文档
site_description: JAiRouter - AI模型服务统一网关，OpenAI兼容API，支持Ollama/vLLM/GPUStack负载均衡、限流熔断、认证鉴权
site_author: Lincoln
site_url: https://jairouter.com/

repo_name: Lincoln-cn/jairouter
repo_url: https://github.com/Lincoln-cn/jairouter
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - content.tabs.link
    - navigation.tracking

plugins:
  - search:
      lang: 
        - zh
        - en
      separator: '[\s\-\.]+'
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
        remove_empty_space: true
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: zh
          default: true
          name: 中文
          build: true
          site_name: "JAiRouter 文档"
        - locale: en
          name: English
          build: true
          site_name: "JAiRouter Documentation"
          nav_translations:
            首页: Home
            入门: Getting Started
            安装指南: Installation Guide
            快速开始: Quick Start
            第一步: First Steps
            配置指南: Configuration
            应用配置: Application Config
            模块化配置: Modular Config
            动态配置: Dynamic Config
            常用服务配置示例: Instance Configuration Examples
            负载均衡: Load Balancing
            限流配置: Rate Limiting
            熔断器: Circuit Breaker
            存储配置: Store Configuration
            JWT持久化: JWT Persistence
            状态持久化: State Persistence
            版本管理: Version Management
            验证规则: Validation Rules
            安全功能: Security Features
            API Key管理: API Key Management
            JWT认证: JWT Authentication
            安全黑名单: Security Blacklist
            审计日志管理: Audit Log Management
            数据脱敏: Data Sanitization
            故障排除: Troubleshooting
            API参考: API Reference
            统一API: Universal API
            管理API: Management API
            监控API: Monitoring API
            OpenAPI规范: OpenAPI Specification
            错误码对照表: Error Codes
            部署指南: Deployment
            Docker部署: Docker Deployment
            Docker优化: Docker Optimization
            Kubernetes部署: Kubernetes Deployment
            生产环境: Production
            中国优化: China Optimization
            GitHub Pages: GitHub Pages
            JWT持久化检查清单: JWT Persistence Checklist
            监控指南: Monitoring
            监控设置: Setup
            监控配置: Monitoring Configuration
            仪表板: Dashboards
            告警配置: Alerts
            告警规则指南: Alert Rules Guide
            慢查询配置: Slow Query Alerts
            监控指标: Metrics
            性能监控: Performance Monitoring
            错误追踪: Error Tracking
            监控测试: Monitoring Testing
            分布式追踪: Distributed Tracing
            追踪概述: Tracing Overview
            快速入门: Quick Start
            配置参考: Configuration Reference
            使用指南: Usage Guide
            性能调优: Performance Tuning
            运维指南: Operations Guide
            开发指南: Development
            架构说明: Architecture
            贡献指南: Contributing
            测试指南: Testing
            代码质量: Code Quality
            性能优化: Performance Optimization
            常见问题: Common Issues
            关键问题修复: Key Issue Fixes
            性能问题: Performance Issues
            调试指南: Debugging Guide
            参考资料: Reference
            更新日志: Changelog
            发展路线图: Roadmap
            FAQ: FAQ
            术语表: Glossary
            适配器更新: Adapter Updates
  - git-revision-date-localized:
      type: date
      enable_creation_date: true
      fallback_to_build_date: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

